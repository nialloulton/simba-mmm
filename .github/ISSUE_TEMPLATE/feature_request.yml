name: Feature Request
description: Suggest a new feature or improvement for Simba
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas for improving Simba. Please describe your suggestion below.

  - type: dropdown
    id: area
    attributes:
      label: Platform Area
      description: Which area of the platform does this relate to?
      options:
        - Data Auditor
        - Measurement / Attribution
        - Scenario Planning
        - Budget Optimization
        - Model Configuration
        - Data Import / Integrations
        - Dashboard / Reporting
        - Collaboration / Team Features
        - API / Exports
        - New Capability
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Need
      description: What problem are you trying to solve? What's missing or frustrating about the current experience?
      placeholder: Describe the problem or unmet need...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this working? Describe your ideal solution.
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?
      placeholder: Describe any alternatives you've tried or considered...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Critical — I can't use Simba effectively without this
        - High — Would significantly improve my workflow
        - Medium — Nice to have, would make things better
        - Low — Minor improvement, not urgent
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other details, screenshots, mockups, or examples that would help us understand your request.
      placeholder: Add any additional context...
    validations:
      required: false
